<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduTrack - Offline</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
        'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
      background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .offline-container {
      text-align: center;
      max-width: 500px;
      background: rgba(30, 41, 59, 0.8);
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 40px 30px;
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
    }
    
    .offline-icon {
      font-size: 64px;
      margin-bottom: 20px;
    }
    
    h1 {
      font-size: 28px;
      margin-bottom: 12px;
      color: #f1f5f9;
    }
    
    .offline-message {
      font-size: 16px;
      color: #cbd5e1;
      margin-bottom: 30px;
      line-height: 1.6;
    }
    
    .offline-details {
      background: rgba(15, 23, 42, 0.5);
      border-left: 3px solid #3B82F6;
      padding: 16px;
      border-radius: 6px;
      margin-bottom: 30px;
      text-align: left;
      font-size: 14px;
    }
    
    .offline-details p {
      margin: 8px 0;
      color: #cbd5e1;
    }
    
    .offline-details strong {
      color: #3B82F6;
    }
    
    .action-buttons {
      display: flex;
      gap: 12px;
      flex-direction: column;
    }
    
    button {
      padding: 12px 24px;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-weight: 500;
    }
    
    .btn-primary {
      background: #3B82F6;
      color: white;
    }
    
    .btn-primary:hover {
      background: #2563EB;
      transform: translateY(-2px);
      box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.3);
    }
    
    .btn-secondary {
      background: transparent;
      color: #3B82F6;
      border: 1px solid #3B82F6;
    }
    
    .btn-secondary:hover {
      background: rgba(59, 130, 246, 0.1);
    }
    
    @media (max-width: 600px) {
      .offline-container {
        padding: 30px 20px;
      }
      
      h1 {
        font-size: 24px;
      }
      
      .offline-icon {
        font-size: 48px;
      }
    }
  </style>
</head>
<body>
  <div class="offline-container">
    <div class="offline-icon">📡</div>
    <h1>You're Offline</h1>
    <p class="offline-message">
      It looks like you've lost your internet connection. Some features may not be available, but you can still access cached content.
    </p>
    
    <div class="offline-details">
      <p><strong>What you can do:</strong></p>
      <p>✓ View previously loaded pages</p>
      <p>✓ Check your local data</p>
      <p>✗ Create new content (until online)</p>
      <p>✗ Sync data (until online)</p>
    </div>
    
    <div class="action-buttons">
      <button class="btn-primary" onclick="location.reload()">
        Try Reloading
      </button>
      <button class="btn-secondary" onclick="goBack()">
        Go Back
      </button>
    </div>
  </div>
  
  <script>
    function goBack() {
      if (window.history.length > 1) {
        window.history.back();
      } else {
        window.location.href = '/';
      }
    }
  </script>
</body>
</html>
